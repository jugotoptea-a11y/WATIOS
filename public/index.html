<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-watios.jpg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-watios.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="WATIOS - Sistema de monitoreo de consumo eléctrico y efecto Joule en tiempo real"
    />
    <meta name="keywords" content="electricidad, consumo, efecto joule, monitoreo, watts, energía" />
    <meta name="author" content="WATIOS" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="WATIOS - Monitor Eléctrico" />
    <meta property="og:description" content="Sistema de monitoreo de consumo eléctrico y efecto Joule en tiempo real" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo-watios.jpg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WATIOS - Monitor Eléctrico" />
    <meta name="twitter:description" content="Sistema de monitoreo de consumo eléctrico y efecto Joule en tiempo real" />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo-watios.jpg" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>WATIOS | Monitor Eléctrico</title>
    
    <style>
      /* Estilos para el loader mientras carga la app */
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #2563eb, #1e40af);
      }
      .loader-content {
        text-align: center;
        color: white;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    
    <!-- Loader inicial -->
    <div id="initial-loader" class="initial-loader">
      <div class="loader-content">
        <img src="%PUBLIC_URL%/logo-watios.jpg" alt="WATIOS Logo" class="loader-logo">
        <h2 style="margin-bottom: 10px;">WATIOS</h2>
        <p>Cargando sistema de monitoreo...</p>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Ocultar loader cuando React cargue
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.display = 'none';
          }
        }, 1500);
      });
    </script>
  </body>
</html>
